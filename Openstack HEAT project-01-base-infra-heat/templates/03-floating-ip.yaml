heat_template_version: 2016-10-14

description: Floating IP y asociación a instancia

parameters:

  port_id:
    type: string
    description: Port ID de la instancia

resources:

  my_floating_ip:
    type: OS::Neutron::FloatingIP
    properties:
      floating_network: external-network

  my_floating_ip_assoc:
    type: OS::Neutron::FloatingIPAssociation
    properties:
      floatingip_id: { get_resource: my_floating_ip }
      port_id: { get_param: port_id }

outputs:

  floating_ip_address:
    description: IP flotante asignada
    value: { get_attr: [my_floating_ip, floating_ip_address] }