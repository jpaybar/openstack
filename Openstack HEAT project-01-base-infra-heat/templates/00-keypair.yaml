heat_template_version: 2016-10-14

description: Creacion de Key Pair

parameters:

  public_key:
    type: string
    description: Clave publica SSH

resources:

  my_keypair:
    type: OS::Nova::KeyPair
    properties:
      name: mykey
      public_key: { get_param: public_key }

outputs:

  key_name:
    description: Nombre del keypair
    value: mykey